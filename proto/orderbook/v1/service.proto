syntax = "proto3";

package orderbook.v1;

option go_package = "github.com/ianunruh/xray/gen/orderbook/v1;orderbookv1";

import "google/protobuf/timestamp.proto";
import "orderbook/v1/events.proto";

enum OrderStatus {
  ORDER_STATUS_UNSPECIFIED = 0;
  ORDER_STATUS_OPEN = 1;
  ORDER_STATUS_PARTIALLY_FILLED = 2;
  ORDER_STATUS_FILLED = 3;
  ORDER_STATUS_CANCELLED = 4;
}

service OrderBookService {
  rpc PlaceOrder(PlaceOrderRequest) returns (PlaceOrderResponse);
  rpc CancelOrder(CancelOrderRequest) returns (CancelOrderResponse);
  rpc GetOrderBook(GetOrderBookRequest) returns (GetOrderBookResponse);
  rpc GetMarketDepth(GetMarketDepthRequest) returns (GetMarketDepthResponse);
  rpc GetOrder(GetOrderRequest) returns (GetOrderResponse);
  rpc ListTrades(ListTradesRequest) returns (ListTradesResponse);
  rpc ListOrders(ListOrdersRequest) returns (ListOrdersResponse);
  rpc StreamMarketDepth(StreamMarketDepthRequest) returns (stream GetMarketDepthResponse);
  rpc StreamTrades(StreamTradesRequest) returns (stream Trade);
}

message PlaceOrderRequest {
  string symbol = 1;
  Side side = 2;
  int64 price = 3;
  int64 quantity = 4;
  OrderType order_type = 5;
  TimeInForce time_in_force = 6;
}

message PlaceOrderResponse {
  string order_id = 1;
  repeated TradeExecuted trades = 2;
}

message CancelOrderRequest {
  string symbol = 1;
  string order_id = 2;
}

message CancelOrderResponse {}

message GetOrderBookRequest {
  string symbol = 1;
}

message GetOrderBookResponse {
  string symbol = 1;
  repeated OrderBookLevel bids = 2;
  repeated OrderBookLevel asks = 3;
}

message OrderBookLevel {
  string order_id = 1;
  int64 price = 2;
  int64 quantity = 3;
  int64 remaining_quantity = 4;
  google.protobuf.Timestamp placed_at = 5;
}

message GetMarketDepthRequest {
  string symbol = 1;
  int32 depth = 2;  // max levels per side, 0 = all
}

message GetMarketDepthResponse {
  string symbol = 1;
  repeated PriceLevel bids = 2;
  repeated PriceLevel asks = 3;
}

message PriceLevel {
  int64 price = 1;
  int64 quantity = 2;
  int32 order_count = 3;
}

message GetOrderRequest {
  string symbol = 1;
  string order_id = 2;
}

message GetOrderResponse {
  string order_id = 1;
  string symbol = 2;
  Side side = 3;
  int64 price = 4;
  int64 quantity = 5;
  int64 remaining_quantity = 6;
  google.protobuf.Timestamp placed_at = 7;
  OrderType order_type = 8;
  TimeInForce time_in_force = 9;
}

message ListTradesRequest {
  string symbol = 1;
}

message ListTradesResponse {
  repeated Trade trades = 1;
}

message Trade {
  string trade_id = 1;
  string symbol = 2;
  string buy_order_id = 3;
  string sell_order_id = 4;
  int64 price = 5;
  int64 quantity = 6;
  google.protobuf.Timestamp executed_at = 7;
}

message ListOrdersRequest {
  string symbol = 1;
}

message StreamMarketDepthRequest {
  string symbol = 1;
  int32 depth = 2;
}

message StreamTradesRequest {
  string symbol = 1;
}

message ListOrdersResponse {
  repeated OrderSummary orders = 1;
}

message OrderSummary {
  string order_id = 1;
  string symbol = 2;
  Side side = 3;
  int64 price = 4;
  int64 quantity = 5;
  int64 remaining_quantity = 6;
  OrderStatus status = 7;
  google.protobuf.Timestamp placed_at = 8;
  OrderType order_type = 9;
  TimeInForce time_in_force = 10;
}

// Saga service — generic service for all saga types.

enum SagaStatus {
  SAGA_STATUS_UNSPECIFIED = 0;
  SAGA_STATUS_PENDING_ENTRY = 1;
  SAGA_STATUS_PENDING_EXIT = 2;
  SAGA_STATUS_COMPLETED = 3;
  SAGA_STATUS_FAILED = 4;
}

enum SagaType {
  SAGA_TYPE_UNSPECIFIED = 0;
  SAGA_TYPE_BRACKET_ORDER = 1;
}

service SagaService {
  rpc PlaceBracketOrder(PlaceBracketOrderRequest) returns (PlaceBracketOrderResponse);
  rpc GetSaga(GetSagaRequest) returns (GetSagaResponse);
  rpc ListSagas(ListSagasRequest) returns (ListSagasResponse);
}

message PlaceBracketOrderRequest {
  string symbol = 1;
  Side side = 2;
  int64 price = 3;
  int64 quantity = 4;
  int64 take_profit_price = 5;
  int64 stop_loss_price = 6;
}

message PlaceBracketOrderResponse {
  string saga_id = 1;
  string entry_order_id = 2;
}

message GetSagaRequest {
  string saga_id = 1;
}

message GetSagaResponse {
  string saga_id = 1;
  SagaType type = 2;
  SagaStatus status = 3;
  string symbol = 4;

  // Bracket order details.
  Side entry_side = 5;
  int64 entry_price = 6;
  int64 entry_quantity = 7;
  int64 take_profit_price = 8;
  int64 stop_loss_price = 9;
  string entry_order_id = 10;
  string take_profit_order_id = 11;
  string stop_loss_order_id = 12;
}

message ListSagasRequest {
  string symbol = 1;
  SagaStatus status = 2;
}

message ListSagasResponse {
  repeated GetSagaResponse sagas = 1;
}
