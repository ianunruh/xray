syntax = "proto3";

package orderbook.v1;

option go_package = "github.com/ianunruh/xray/gen/orderbook/v1;orderbookv1";

import "google/protobuf/timestamp.proto";

enum Side {
  SIDE_UNSPECIFIED = 0;
  SIDE_BUY = 1;
  SIDE_SELL = 2;
}

// PositionSide is order intent — distinct from Side, which is order
// direction at the book. A BUY can open a long or cover a short; a
// SELL can close a long or open a short. The orderbook itself does
// not care, but sagas and portfolio accounting do. Lives here (the
// shared leaf package) to avoid a circular import between portfolio
// and orderbook protos.
enum PositionSide {
  POSITION_SIDE_UNSPECIFIED = 0;
  POSITION_SIDE_LONG = 1;
  POSITION_SIDE_SHORT = 2;
}

enum OrderType {
  ORDER_TYPE_UNSPECIFIED = 0;
  ORDER_TYPE_LIMIT = 1;
  ORDER_TYPE_MARKET = 2;
  ORDER_TYPE_STOP_MARKET = 3;
  ORDER_TYPE_STOP_LIMIT = 4;
}

enum TimeInForce {
  TIME_IN_FORCE_UNSPECIFIED = 0;
  TIME_IN_FORCE_GTC = 1;
  TIME_IN_FORCE_IOC = 2;
  TIME_IN_FORCE_FOK = 3;
  TIME_IN_FORCE_DAY = 4;
  // AT_OPEN / AT_CLOSE bind the order to a specific auction cross.
  // Combined with ORDER_TYPE_MARKET this yields MOO/MOC; with
  // ORDER_TYPE_LIMIT it yields LOO/LOC. Unfilled at the uncross →
  // cancelled with reason "missed_auction".
  TIME_IN_FORCE_AT_OPEN = 5;
  TIME_IN_FORCE_AT_CLOSE = 6;
}

// MarketPhase gates how the orderbook handles incoming orders. Default
// (no MarketPhaseChanged events in history) is CONTINUOUS — the existing
// price-time priority matching behaviour. AUCTION accumulates orders
// without crossing; Uncross runs an equilibrium-price algorithm and
// flips back to CONTINUOUS. CLOSING_AUCTION is the same but flips to
// CLOSED on uncross.
enum MarketPhase {
  MARKET_PHASE_UNSPECIFIED = 0;
  MARKET_PHASE_CONTINUOUS = 1;
  MARKET_PHASE_AUCTION = 2;
  MARKET_PHASE_CLOSING_AUCTION = 3;
  MARKET_PHASE_CLOSED = 4;
}

// CrossType marks how a trade was produced. NONE = ordinary continuous
// trade; OPENING/CLOSING tag the batch emitted by an auction uncross;
// HALT_REOPEN is reserved for intraday halt/reopen auctions.
enum CrossType {
  CROSS_TYPE_NONE = 0;
  CROSS_TYPE_OPENING = 1;
  CROSS_TYPE_CLOSING = 2;
  CROSS_TYPE_HALT_REOPEN = 3;
}

message OrderPlaced {
  string order_id = 1;
  string symbol = 2;
  Side side = 3;
  int64 price = 4;
  int64 quantity = 5;
  google.protobuf.Timestamp placed_at = 6;
  OrderType order_type = 7;
  TimeInForce time_in_force = 8;
  int64 stop_price = 9;
  string account_id = 10;
  // oco_group_id links orders such that the first to trade (any qty)
  // atomically cancels every other order in the group, before further
  // matching or stop-trigger passes. Empty = not in a group.
  string oco_group_id = 11;
}

message OrderCancelled {
  string order_id = 1;
  string symbol = 2;
  string reason = 3;
}

message TradeExecuted {
  string trade_id = 1;
  string buy_order_id = 2;
  string sell_order_id = 3;
  string symbol = 4;
  int64 price = 5;
  int64 quantity = 6;
  google.protobuf.Timestamp executed_at = 7;
  // cross_type=NONE for continuous-matching trades; OPENING/CLOSING for
  // trades emitted by an auction uncross. Informational — projections
  // can use it to highlight closing prints, etc.
  CrossType cross_type = 8;
}

message StopTriggered {
  string order_id = 1;
  string symbol = 2;
  int64 stop_price = 3;
  int64 trigger_price = 4;
  OrderType activated_as = 5;
}

message MarketClosed {
  string symbol = 1;
  google.protobuf.Timestamp closed_at = 2;
}

// MarketPhaseChanged announces that the orderbook has moved between
// phases (continuous, auction, closed). Emitted by OpenAuction,
// BeginClosingAuction, and the closing branch of Uncross.
message MarketPhaseChanged {
  string symbol = 1;
  MarketPhase phase = 2;
  // reason is a human-readable tag, e.g. "session_open", "manual",
  // "uncross_complete". Not interpreted by the engine.
  string reason = 3;
  google.protobuf.Timestamp at = 4;
}

// AuctionUncrossed is the header event of an uncross batch, carrying
// the clearing price and aggregate matched/imbalance quantities. The
// individual TradeExecuted events that follow in the same batch carry
// the per-pair fills at clearing_price with cross_type set.
message AuctionUncrossed {
  string symbol = 1;
  int64 clearing_price = 2;
  int64 matched_qty = 3;
  // imbalance_qty is the unmatched quantity at the clearing price on
  // imbalance_side. Zero when balanced.
  int64 imbalance_qty = 4;
  Side imbalance_side = 5;
  CrossType cross_type = 6;
  google.protobuf.Timestamp at = 7;
}

// OfficialCloseSet is the canonical end-of-day mark, derivable from
// the last cross_type=CLOSING trade but emitted explicitly so the
// daily_close projection doesn't have to scan trades.
//
// Downstream consumers (fund NAV, mark-to-market, charting close axis,
// closing-print UI badges) treat this as the authoritative session-end
// price. session_date is a YYYY-MM-DD string for easy keying.
message OfficialCloseSet {
  string symbol = 1;
  string session_date = 2;
  int64 close_price = 3;
  int64 close_volume = 4;
  google.protobuf.Timestamp at = 5;
}

// Saga lifecycle events — stored under aggregate ID "saga:{uuid}".

message SagaStarted {
  string saga_id = 1;
  string symbol = 2;
  Side entry_side = 3;
  int64 entry_price = 4;
  int64 entry_quantity = 5;
  int64 take_profit_price = 6;
  int64 stop_loss_price = 7;
  // entry_order_id is set on the SagaStarted event for backward
  // compatibility with previously-stored events. New brackets derive
  // the entry order ID from the entry ordersaga (ordersaga.OrderID).
  string entry_order_id = 8;
  google.protobuf.Timestamp started_at = 9;
  string account_id = 10;
  // SHORT bracket: entry_side=SELL+SHORT (sell-to-open), exits derived
  // as BUY+SHORT (buy-to-cover).
  PositionSide position_side = 11;
}

message EntryFilled {
  string saga_id = 1;
  string take_profit_order_id = 2;
  string stop_loss_order_id = 3;
  google.protobuf.Timestamp filled_at = 4;
}

message ExitFilled {
  string saga_id = 1;
  string filled_order_id = 2;
  string cancelled_order_id = 3;
  google.protobuf.Timestamp filled_at = 4;
}

message SagaCompleted {
  string saga_id = 1;
  google.protobuf.Timestamp completed_at = 2;
}

message SagaFailed {
  string saga_id = 1;
  string reason = 2;
  google.protobuf.Timestamp failed_at = 3;
}

message SagaActionFailed {
  string saga_id = 1;
  string action = 2;
  int32 attempts = 3;
  google.protobuf.Timestamp failed_at = 4;
}

// OCOSaga aggregate events — stored under "oco-saga:{uuid}". An OCO
// saga holds shares once, places TP and SL with a shared orderbook OCO
// group, settles whichever fills first, and releases any remainder on
// failure.
message OCOSagaStarted {
  string saga_id = 1;
  string account_id = 2;
  string symbol = 3;
  Side exit_side = 4;
  int64 quantity = 5;
  int64 take_profit_price = 6;
  int64 stop_loss_price = 7;
  google.protobuf.Timestamp started_at = 8;
  // LONG = exiting long inventory (exit_side typically SELL).
  // SHORT = covering a short (exit_side typically BUY).
  PositionSide position_side = 9;
}

message OCOSagaSharesHeld {
  string saga_id = 1;
  google.protobuf.Timestamp held_at = 2;
}

message OCOSagaExitPlaced {
  string saga_id = 1;
  string take_profit_order_id = 2;
  string stop_loss_order_id = 3;
  google.protobuf.Timestamp placed_at = 4;
}

message OCOSagaFillRecorded {
  string saga_id = 1;
  string trade_id = 2;
  string order_id = 3;
  int64 fill_quantity = 4;
  int64 fill_price = 5;
  google.protobuf.Timestamp recorded_at = 6;
}

message OCOSagaCompleted {
  string saga_id = 1;
  google.protobuf.Timestamp completed_at = 2;
}

message OCOSagaFailed {
  string saga_id = 1;
  string reason = 2;
  google.protobuf.Timestamp failed_at = 3;
}

message OCOSagaActionFailed {
  string saga_id = 1;
  string action = 2;
  int32 attempts = 3;
  google.protobuf.Timestamp failed_at = 4;
}
