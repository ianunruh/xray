<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>xray</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --bid: #3fb950;
    --bid-bg: rgba(63, 185, 80, 0.10);
    --ask: #f85149;
    --ask-bg: rgba(248, 81, 73, 0.10);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
    font-size: 13px;
    background: var(--bg);
    color: var(--text);
    padding: 16px;
  }
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }
  header h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 1px;
  }
  header input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    padding: 6px 10px;
    font-family: inherit;
    font-size: 13px;
    width: 100px;
    text-transform: uppercase;
  }
  header button {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    padding: 6px 14px;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
  }
  header button:hover { border-color: var(--text-dim); }
  #status {
    font-size: 12px;
    color: var(--text-dim);
  }
  #status.connected { color: var(--bid); }
  #status.error { color: var(--ask); }

  h2 {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  .depth-container { margin-bottom: 24px; }
  .depth-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
  }
  th {
    text-align: right;
    padding: 4px 8px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
  }
  td {
    text-align: right;
    padding: 3px 8px;
    font-variant-numeric: tabular-nums;
  }
  .bids td { border-left: 2px solid transparent; }
  .asks td { border-left: 2px solid transparent; }
  .bids tr { background: linear-gradient(to left, transparent, transparent); }
  .asks tr { background: linear-gradient(to right, transparent, transparent); }
  .bids .price { color: var(--bid); }
  .asks .price { color: var(--ask); }

  .depth-bar {
    position: relative;
  }
  .depth-bar::after {
    content: '';
    position: absolute;
    top: 0;
    bottom: 0;
    right: 0;
    pointer-events: none;
  }
  .bids .depth-bar::after { background: var(--bid-bg); width: var(--bar-width); }
  .asks .depth-bar::after { background: var(--ask-bg); left: 0; right: auto; width: var(--bar-width); }

  .trades-container { }
  .trades-table td, .trades-table th { text-align: right; }
  .trades-table tr.flash { animation: flash 0.4s ease-out; }
  @keyframes flash {
    from { background: rgba(255,255,255,0.08); }
    to { background: transparent; }
  }
  .empty-msg {
    color: var(--text-dim);
    padding: 16px 8px;
    text-align: center;
  }
</style>
</head>
<body>
<header>
  <h1>xray</h1>
  <input id="symbol" value="AAPL" placeholder="Symbol">
  <button id="connect-btn">Connect</button>
  <span id="status">Disconnected</span>
</header>

<div class="depth-container">
  <h2>Market Depth</h2>
  <div class="depth-grid">
    <table class="bids">
      <thead><tr><th>Orders</th><th>Qty</th><th>Price</th></tr></thead>
      <tbody id="bids-body"><tr><td colspan="3" class="empty-msg">--</td></tr></tbody>
    </table>
    <table class="asks">
      <thead><tr><th>Price</th><th>Qty</th><th>Orders</th></tr></thead>
      <tbody id="asks-body"><tr><td colspan="3" class="empty-msg">--</td></tr></tbody>
    </table>
  </div>
</div>

<div class="trades-container">
  <h2>Recent Trades</h2>
  <table class="trades-table">
    <thead><tr><th>Time</th><th>Price</th><th>Qty</th></tr></thead>
    <tbody id="trades-body"><tr><td colspan="3" class="empty-msg">No trades</td></tr></tbody>
  </table>
</div>

<script>
const MAX_TRADES = 100;

let depthAbort = null;
let tradesAbort = null;

function formatPrice(p) {
  return (p / 10000).toFixed(2);
}

function formatQty(q) {
  return q.toLocaleString();
}

function formatTime(ts) {
  if (!ts) return '--';
  const d = new Date(ts);
  return d.toLocaleTimeString();
}

function setStatus(text, cls) {
  const el = document.getElementById('status');
  el.textContent = text;
  el.className = cls || '';
}

function renderDepth(msg) {
  const bidsBody = document.getElementById('bids-body');
  const asksBody = document.getElementById('asks-body');

  const bids = msg.bids || [];
  const asks = msg.asks || [];

  const maxBidQty = bids.reduce((m, b) => Math.max(m, Number(b.quantity)), 0);
  const maxAskQty = asks.reduce((m, a) => Math.max(m, Number(a.quantity)), 0);
  const maxQty = Math.max(maxBidQty, maxAskQty, 1);

  if (bids.length === 0) {
    bidsBody.innerHTML = '<tr><td colspan="3" class="empty-msg">--</td></tr>';
  } else {
    bidsBody.innerHTML = bids.map(b => {
      const pct = (Number(b.quantity) / maxQty * 100).toFixed(1);
      return '<tr><td>' + (b.orderCount || 0) + '</td><td>' + formatQty(Number(b.quantity)) +
        '</td><td class="price depth-bar" style="--bar-width:' + pct + '%">' + formatPrice(Number(b.price)) + '</td></tr>';
    }).join('');
  }

  if (asks.length === 0) {
    asksBody.innerHTML = '<tr><td colspan="3" class="empty-msg">--</td></tr>';
  } else {
    asksBody.innerHTML = asks.map(a => {
      const pct = (Number(a.quantity) / maxQty * 100).toFixed(1);
      return '<tr><td class="price depth-bar" style="--bar-width:' + pct + '%">' + formatPrice(Number(a.price)) +
        '</td><td>' + formatQty(Number(a.quantity)) + '</td><td>' + (a.orderCount || 0) + '</td></tr>';
    }).join('');
  }
}

const trades = [];

function addTrade(t) {
  trades.unshift(t);
  if (trades.length > MAX_TRADES) trades.length = MAX_TRADES;
  renderTrades(true);
}

function renderTrades(flash) {
  const body = document.getElementById('trades-body');
  if (trades.length === 0) {
    body.innerHTML = '<tr><td colspan="3" class="empty-msg">No trades</td></tr>';
    return;
  }
  body.innerHTML = trades.map((t, i) => {
    const cls = flash && i === 0 ? ' class="flash"' : '';
    return '<tr' + cls + '><td>' + formatTime(t.executedAt) +
      '</td><td>' + formatPrice(Number(t.price)) +
      '</td><td>' + formatQty(Number(t.quantity)) + '</td></tr>';
  }).join('');
}

function envelopeRequest(obj) {
  const payload = new TextEncoder().encode(JSON.stringify(obj));
  const frame = new ArrayBuffer(5 + payload.length);
  const view = new DataView(frame);
  view.setUint8(0, 0x00);
  view.setUint32(1, payload.length);
  new Uint8Array(frame).set(payload, 5);
  return new Uint8Array(frame);
}

async function readConnectStream(url, request, onMessage, signal) {
  const response = await fetch(url, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/connect+json',
      'Connect-Protocol-Version': '1',
    },
    body: envelopeRequest(request),
    signal: signal,
  });

  if (!response.ok) {
    throw new Error('HTTP ' + response.status);
  }

  const reader = response.body.getReader();
  let buffer = new Uint8Array(0);

  while (true) {
    const { done, value } = await reader.read();

    if (value) {
      const newBuf = new Uint8Array(buffer.length + value.length);
      newBuf.set(buffer);
      newBuf.set(value, buffer.length);
      buffer = newBuf;
    }

    while (buffer.length >= 5) {
      const flags = buffer[0];
      const dv = new DataView(buffer.buffer, buffer.byteOffset, 5);
      const size = dv.getUint32(1);

      if (buffer.length < 5 + size) break;

      const data = buffer.slice(5, 5 + size);
      buffer = buffer.slice(5 + size);

      if (flags & 0x02) {
        const trailer = JSON.parse(new TextDecoder().decode(data));
        if (trailer.error) {
          throw new Error(trailer.error.message || 'Stream error');
        }
        return;
      }

      onMessage(JSON.parse(new TextDecoder().decode(data)));
    }

    if (done) break;
  }
}

function disconnect() {
  if (depthAbort) { depthAbort.abort(); depthAbort = null; }
  if (tradesAbort) { tradesAbort.abort(); tradesAbort = null; }
}

async function connectToSymbol(symbol) {
  disconnect();
  trades.length = 0;
  renderTrades(false);
  setStatus('Connecting...', '');

  depthAbort = new AbortController();
  tradesAbort = new AbortController();

  let activeStreams = 2;
  function onStreamEnd() {
    if (--activeStreams <= 0) {
      setStatus('Disconnected', '');
    }
  }

  readConnectStream(
    '/orderbook.v1.OrderBookService/StreamMarketDepth',
    { symbol: symbol, depth: 20 },
    function(msg) {
      setStatus('Connected', 'connected');
      renderDepth(msg);
    },
    depthAbort.signal,
  ).catch(function(err) {
    if (err.name !== 'AbortError') {
      console.error('Depth stream error:', err);
      setStatus('Error: ' + err.message, 'error');
    }
  }).finally(onStreamEnd);

  readConnectStream(
    '/orderbook.v1.OrderBookService/StreamTrades',
    { symbol: symbol },
    function(msg) {
      addTrade(msg);
    },
    tradesAbort.signal,
  ).catch(function(err) {
    if (err.name !== 'AbortError') {
      console.error('Trades stream error:', err);
    }
  }).finally(onStreamEnd);
}

document.getElementById('connect-btn').addEventListener('click', function() {
  const symbol = document.getElementById('symbol').value.trim().toUpperCase();
  if (symbol) connectToSymbol(symbol);
});

document.getElementById('symbol').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const symbol = this.value.trim().toUpperCase();
    if (symbol) connectToSymbol(symbol);
  }
});
</script>
</body>
</html>
