syntax = "proto3";

package orderbook.v1;

option go_package = "github.com/ianunruh/xray/gen/orderbook/v1;orderbookv1";

import "google/protobuf/timestamp.proto";
import "orderbook/v1/events.proto";

enum OrderStatus {
  ORDER_STATUS_UNSPECIFIED = 0;
  ORDER_STATUS_OPEN = 1;
  ORDER_STATUS_PARTIALLY_FILLED = 2;
  ORDER_STATUS_FILLED = 3;
  ORDER_STATUS_CANCELLED = 4;
}

service OrderBookService {
  rpc PlaceOrder(PlaceOrderRequest) returns (PlaceOrderResponse);
  rpc CancelOrder(CancelOrderRequest) returns (CancelOrderResponse);
  rpc ReplaceOrder(ReplaceOrderRequest) returns (ReplaceOrderResponse);
  rpc CloseMarket(CloseMarketRequest) returns (CloseMarketResponse);
  rpc OpenAuction(OpenAuctionRequest) returns (OpenAuctionResponse);
  rpc BeginClosingAuction(BeginClosingAuctionRequest) returns (BeginClosingAuctionResponse);
  rpc Uncross(UncrossRequest) returns (UncrossResponse);
  rpc GetOfficialClose(GetOfficialCloseRequest) returns (GetOfficialCloseResponse);
  rpc ListOfficialCloses(ListOfficialClosesRequest) returns (ListOfficialClosesResponse);
  rpc GetOrderBook(GetOrderBookRequest) returns (GetOrderBookResponse);
  rpc GetMarketDepth(GetMarketDepthRequest) returns (GetMarketDepthResponse);
  rpc GetOrder(GetOrderRequest) returns (GetOrderResponse);
  rpc ListTrades(ListTradesRequest) returns (ListTradesResponse);
  rpc ListOrders(ListOrdersRequest) returns (ListOrdersResponse);
  rpc ListSymbols(ListSymbolsRequest) returns (ListSymbolsResponse);
  rpc StreamMarketDepth(StreamMarketDepthRequest) returns (stream GetMarketDepthResponse);
  rpc StreamTrades(StreamTradesRequest) returns (stream Trade);
  rpc GetCandles(GetCandlesRequest) returns (GetCandlesResponse);
  rpc StreamCandles(StreamCandlesRequest) returns (stream Candle);
}

message PlaceOrderRequest {
  string symbol = 1;
  Side side = 2;
  int64 price = 3;
  int64 quantity = 4;
  OrderType order_type = 5;
  TimeInForce time_in_force = 6;
  int64 stop_price = 7;
  string account_id = 8;
}

message PlaceOrderResponse {
  string order_id = 1;
  repeated TradeExecuted trades = 2;
}

message CancelOrderRequest {
  string symbol = 1;
  string order_id = 2;
}

message CancelOrderResponse {}

message ReplaceOrderRequest {
  string symbol = 1;
  string old_order_id = 2;
  string new_order_id = 3;
  Side side = 4;
  int64 price = 5;
  int64 quantity = 6;
  OrderType order_type = 7;
  TimeInForce time_in_force = 8;
  string account_id = 9;
}

message ReplaceOrderResponse {
  string order_id = 1;
  repeated TradeExecuted trades = 2;
}

message CloseMarketRequest {
  string symbol = 1;
}

message CloseMarketResponse {
  int32 cancelled_orders = 1;
}

message OpenAuctionRequest {
  string symbol = 1;
  // reason is recorded on MarketPhaseChanged; defaults to "session_open".
  string reason = 2;
}

message OpenAuctionResponse {}

message BeginClosingAuctionRequest {
  string symbol = 1;
  // reason is recorded on MarketPhaseChanged; defaults to "session_close".
  string reason = 2;
}

message BeginClosingAuctionResponse {}

message UncrossRequest {
  string symbol = 1;
}

message UncrossResponse {
  int64 clearing_price = 1;
  int64 matched_qty = 2;
  int64 imbalance_qty = 3;
  Side imbalance_side = 4;
  CrossType cross_type = 5;
  int32 trade_count = 6;
}

message GetOfficialCloseRequest {
  string symbol = 1;
  // session_date as YYYY-MM-DD. Empty = most recent close.
  string session_date = 2;
}

message GetOfficialCloseResponse {
  string symbol = 1;
  string session_date = 2;
  int64 close_price = 3;
  int64 close_volume = 4;
  google.protobuf.Timestamp closed_at = 5;
}

message ListOfficialClosesRequest {
  string symbol = 1;
  // from/to are inclusive YYYY-MM-DD; either may be empty for open-ended.
  string from = 2;
  string to = 3;
}

message ListOfficialClosesResponse {
  repeated GetOfficialCloseResponse closes = 1;
}

message GetOrderBookRequest {
  string symbol = 1;
}

message GetOrderBookResponse {
  string symbol = 1;
  repeated OrderBookLevel bids = 2;
  repeated OrderBookLevel asks = 3;
  MarketPhase phase = 4;
}

message OrderBookLevel {
  string order_id = 1;
  int64 price = 2;
  int64 quantity = 3;
  int64 remaining_quantity = 4;
  google.protobuf.Timestamp placed_at = 5;
}

message GetMarketDepthRequest {
  string symbol = 1;
  int32 depth = 2;  // max levels per side, 0 = all
}

message GetMarketDepthResponse {
  string symbol = 1;
  repeated PriceLevel bids = 2;
  repeated PriceLevel asks = 3;
}

message PriceLevel {
  int64 price = 1;
  int64 quantity = 2;
  int32 order_count = 3;
}

message GetOrderRequest {
  string symbol = 1;
  string order_id = 2;
}

message GetOrderResponse {
  string order_id = 1;
  string symbol = 2;
  Side side = 3;
  int64 price = 4;
  int64 quantity = 5;
  int64 remaining_quantity = 6;
  google.protobuf.Timestamp placed_at = 7;
  OrderType order_type = 8;
  TimeInForce time_in_force = 9;
  int64 stop_price = 10;
}

message ListTradesRequest {
  string symbol = 1;
}

message ListTradesResponse {
  repeated Trade trades = 1;
}

message Trade {
  string trade_id = 1;
  string symbol = 2;
  string buy_order_id = 3;
  string sell_order_id = 4;
  int64 price = 5;
  int64 quantity = 6;
  google.protobuf.Timestamp executed_at = 7;
}

message ListOrdersRequest {
  string symbol = 1;
}

message StreamMarketDepthRequest {
  string symbol = 1;
  int32 depth = 2;
}

message StreamTradesRequest {
  string symbol = 1;
}

enum CandleInterval {
  CANDLE_INTERVAL_UNSPECIFIED = 0;
  CANDLE_INTERVAL_1M = 1;
  CANDLE_INTERVAL_5M = 2;
  CANDLE_INTERVAL_15M = 3;
  CANDLE_INTERVAL_1H = 4;
  CANDLE_INTERVAL_1D = 5;
}

message Candle {
  string symbol = 1;
  CandleInterval interval = 2;
  google.protobuf.Timestamp open_time = 3;
  int64 open = 4;
  int64 high = 5;
  int64 low = 6;
  int64 close = 7;
  int64 volume = 8;
}

message GetCandlesRequest {
  string symbol = 1;
  CandleInterval interval = 2;
  google.protobuf.Timestamp from = 3;
  google.protobuf.Timestamp to = 4;
}

message GetCandlesResponse {
  repeated Candle candles = 1;
}

message StreamCandlesRequest {
  string symbol = 1;
  CandleInterval interval = 2;
}

message ListOrdersResponse {
  repeated OrderSummary orders = 1;
}

message ListSymbolsRequest {}

message ListSymbolsResponse {
  repeated string symbols = 1;
}

message OrderSummary {
  string order_id = 1;
  string symbol = 2;
  Side side = 3;
  int64 price = 4;
  int64 quantity = 5;
  int64 remaining_quantity = 6;
  OrderStatus status = 7;
  google.protobuf.Timestamp placed_at = 8;
  OrderType order_type = 9;
  TimeInForce time_in_force = 10;
  int64 stop_price = 11;
}

// Saga RPCs moved to saga.v1.SagaService.
