syntax = "proto3";

package portfolio.v1;

option go_package = "github.com/ianunruh/xray/gen/portfolio/v1;portfoliov1";

import "google/protobuf/timestamp.proto";
import "orderbook/v1/events.proto";

service PortfolioService {
  rpc Deposit(DepositRequest) returns (DepositResponse);
  rpc Withdraw(WithdrawRequest) returns (WithdrawResponse);
  rpc CreditShares(CreditSharesRequest) returns (CreditSharesResponse);
  rpc GetPortfolio(GetPortfolioRequest) returns (GetPortfolioResponse);
  rpc StreamPortfolio(StreamPortfolioRequest) returns (stream GetPortfolioResponse);
  rpc GetPnL(GetPnLRequest) returns (GetPnLResponse);
  rpc ListPortfolios(ListPortfoliosRequest) returns (ListPortfoliosResponse);
  rpc GetMarginSnapshot(GetMarginSnapshotRequest) returns (GetMarginSnapshotResponse);
  rpc PreviewOrderImpact(PreviewOrderImpactRequest) returns (PreviewOrderImpactResponse);
  rpc ListMarginCalls(ListMarginCallsRequest) returns (ListMarginCallsResponse);
  rpc ListFeeHistory(ListFeeHistoryRequest) returns (ListFeeHistoryResponse);
}

message DepositRequest {
  string account_id = 1;
  int64 amount = 2;
}

message DepositResponse {}

message WithdrawRequest {
  string account_id = 1;
  int64 amount = 2;
}

message WithdrawResponse {}

message CreditSharesRequest {
  string account_id = 1;
  string symbol = 2;
  int64 quantity = 3;
  int64 cost_per_share = 4;
}

message CreditSharesResponse {}

message GetPortfolioRequest {
  string account_id = 1;
}

message GetPortfolioResponse {
  string account_id = 1;
  int64 cash_balance = 2;
  int64 cash_held = 3;
  repeated Holding holdings = 4;
  repeated PendingOrder pending_orders = 5;
  // Cumulative realized P&L across every closed position, long and
  // short, summed from projection_pnl_positions. Holdings.realized_pnl
  // covers only long positions and won't include short-cover P&L.
  int64 total_realized_pnl = 6;
}

message Holding {
  string symbol = 1;
  int64 quantity = 2;
  int64 total_cost = 3;
  int64 average_cost = 4;
  int64 shares_held = 5;
  int64 realized_pnl = 6;
}

message PendingOrder {
  string saga_id = 1;
  string symbol = 2;
  orderbook.v1.Side side = 3;
  int64 price = 4;
  int64 quantity = 5;
  orderbook.v1.OrderType order_type = 6;
  orderbook.v1.TimeInForce time_in_force = 7;
  int64 filled_quantity = 8;
  OrderStatus status = 9;
  google.protobuf.Timestamp started_at = 10;
  string fail_reason = 11;
  google.protobuf.Timestamp ended_at = 12;
  // Price of the most recent fill on this order. Zero before the
  // first fill. Useful for market orders where price (the limit) is
  // unset, so the actual execution price isn't otherwise visible.
  int64 last_fill_price = 13;
  // Iceberg slice size for the underlying orderbook order; 0 = normal.
  int64 display_quantity = 14;
  // Cumulative transaction fees paid on this order's fills (this
  // account's side only). Sum of TransactionFeeCharged.amount across
  // every fill.
  int64 fees_paid = 15;
  // Volume-weighted average fill price across every fill on this
  // order: sum(cash_settled) / sum(fill_quantity). Zero before the
  // first fill. Useful for market orders where price (the limit) is
  // unset and last_fill_price only shows the most recent slice.
  int64 vwap_fill_price = 16;
}

// OrderStatus is kept for the PendingOrder field on GetPortfolioResponse,
// which the portfolio projection still surfaces inline. The dedicated
// per-saga GetOrderStatus RPC has moved to saga.v1.SagaService.Get.
enum OrderStatus {
  ORDER_STATUS_UNSPECIFIED = 0;
  ORDER_STATUS_STARTED = 1;
  ORDER_STATUS_CASH_HELD = 2;
  ORDER_STATUS_ORDER_PLACED = 3;
  ORDER_STATUS_COMPLETED = 4;
  ORDER_STATUS_FAILED = 5;
}

message StreamPortfolioRequest {
  string account_id = 1;
}

message GetPnLRequest {
  string account_id = 1;
}

message GetPnLResponse {
  string account_id = 1;
  repeated PositionPnL positions = 2;
  int64 total_realized_pnl = 3;
  repeated PnLEntry history = 4;
}

message PositionPnL {
  string symbol = 1;
  int64 quantity = 2;
  int64 avg_cost = 3;
  int64 total_cost = 4;
  int64 realized_pnl = 5;
  // LONG (default) = bought, owns shares. SHORT = sold-to-open,
  // owes shares back. avg_cost is the open price for shorts.
  orderbook.v1.PositionSide position_side = 6;
}

message PnLEntry {
  string symbol = 1;
  orderbook.v1.Side side = 2;
  int64 quantity = 3;
  int64 price = 4;
  int64 realized_pnl = 5;
  google.protobuf.Timestamp settled_at = 6;
  orderbook.v1.PositionSide position_side = 7;
}

message ListPortfoliosRequest {}

message ListPortfoliosResponse {
  repeated string account_ids = 1;
}

// GetMarginSnapshot returns a point-in-time mark-to-market view of an
// account: cash buckets, position market values, equity, and the
// maintenance-margin requirement implied by open shorts at current
// marks.
message GetMarginSnapshotRequest {
  string account_id = 1;
}

message GetMarginSnapshotResponse {
  string account_id = 1;

  // Cash buckets (snapshot of portfolio aggregate state).
  int64 cash_balance = 2;
  int64 cash_held = 3;
  int64 collateral_pool = 4;
  int64 proceeds_pool = 5;
  // Per-saga collateral held pre-fill — summed for convenience.
  int64 collateral_held_pre_fill = 6;

  // Market values from current marks. long_market_value is the sum of
  // owned shares at mark; short_liability is the cost to repurchase
  // all open shorts at mark.
  int64 long_market_value = 7;
  int64 short_liability = 8;

  // equity = cash + cash_held + pools + collateral_held_pre_fill +
  //          long_mv - short_liability.
  int64 equity = 9;

  // maintenance_requirement is the equity floor implied by open
  // shorts at the current maintenance rate (see internal/margin).
  int64 maintenance_requirement = 10;

  // margin_excess = equity - maintenance_requirement. Negative means
  // a margin call should fire.
  int64 margin_excess = 11;
  bool margin_call = 12;

  // missing_marks lists symbols held (long or short) for which no
  // mark is currently available. Equity treats their contribution
  // as zero — callers should surface this to avoid acting on
  // stale-by-omission snapshots.
  repeated string missing_marks = 13;

  repeated PositionMarginInfo positions = 14;

  // buying_power is what's available to back new orders, accounting
  // for margin leverage: 2 * (equity - maintenance_requirement),
  // floored at zero. With no positions, equals 2x cash.
  int64 buying_power = 15;

  // margin_loan is the outstanding borrow against the broker — the
  // negative portion of CashBalance, exposed as a positive number.
  // Created when buys exceed cash; paid down by sells.
  int64 margin_loan = 16;

  // Maintenance requirement broken out by side. Total is the field
  // above; this lets the UI explain where the requirement comes from.
  int64 long_maintenance_requirement = 17;
  int64 short_maintenance_requirement = 18;

  // When margin_call=true, the instant at which the grace period
  // expires and auto-liquidation will fire. Unset when no call is
  // active. UI renders this as a countdown in the active-call alert.
  google.protobuf.Timestamp margin_call_grace_expires_at = 19;
}

// MarginCallRecord is one row in the audit log: the issued snapshot
// plus, when present, the covered snapshot and the liquidation sagas
// the call spawned. Streamed by PortfolioService.ListMarginCalls,
// newest-first.
message MarginCallRecord {
  string call_id = 1;
  string account_id = 2;
  string trigger_trade_id = 3;
  string trigger_symbol = 4;
  int64 mark_price = 5;
  int64 equity_at_issue = 6;
  int64 maintenance_requirement_at_issue = 7;
  google.protobuf.Timestamp issued_at = 8;

  // Set when the call has been resolved (covered or cleared).
  google.protobuf.Timestamp covered_at = 9;
  int64 equity_at_cover = 10;
  int64 maintenance_requirement_at_cover = 11;

  // Saga IDs of every BUY-to-cover the margincall reactor spawned
  // for this call. UI uses these to link to the diagnostics view.
  repeated string liquidation_saga_ids = 12;

  // Wall-clock instant when the user's grace period ends and auto-
  // liquidation fires. Frozen at issue time on MarginCallIssued; same
  // value lives on the aggregate's ActiveMarginCall.
  google.protobuf.Timestamp grace_expires_at = 13;
}

message ListMarginCallsRequest {
  string account_id = 1;
  // Optional cap; 0 = no limit.
  int32 limit = 2;
}

message ListMarginCallsResponse {
  repeated MarginCallRecord calls = 1;
}

// FeeKind discriminates rows in the fee-history projection. Each row
// is one event: a transaction-fee fill, one cycle of margin interest,
// or one cycle of short-borrow fee.
enum FeeKind {
  FEE_KIND_UNSPECIFIED      = 0;
  FEE_KIND_TRANSACTION      = 1;
  FEE_KIND_MARGIN_INTEREST  = 2;
  FEE_KIND_SHORT_BORROW     = 3;
}

// FeeRecord is one row in the per-account fee history feed. Optional
// fields (symbol, related_id, rate_bps, notional, period_start) are
// populated only for the kinds where they apply.
message FeeRecord {
  string                      account_id   = 1;
  FeeKind                     kind         = 2;
  // Cash debited. Always >= 0; zero is meaningful for accruals (the
  // rate ticked but there was nothing owed).
  int64                       amount       = 3;
  // Empty for FEE_KIND_MARGIN_INTEREST.
  string                      symbol       = 4;
  // For transaction fees: the fill instant. For accruals: period_end.
  google.protobuf.Timestamp   charged_at   = 5;
  // For transaction fees: trade_id. Empty for accruals.
  string                      related_id   = 6;
  // Rate in bps. Only populated for accruals.
  int64                       rate_bps     = 7;
  // Notional the fee was applied to. Only populated for transaction
  // fees.
  int64                       notional     = 8;
  // Start of the accrual cycle. Only populated for accruals.
  google.protobuf.Timestamp   period_start = 9;
}

message ListFeeHistoryRequest {
  string account_id = 1;
  // Cap. 0 = no cap.
  int32  limit      = 2;
}

message ListFeeHistoryResponse {
  // Newest-first.
  repeated FeeRecord records = 1;
}

// PreviewOrderImpact simulates the hold + fill an order would create
// and returns the resulting margin state. Used by the UI to surface
// "would this put me in margin call" before the user submits.
message PreviewOrderImpactRequest {
  string account_id = 1;
  string symbol = 2;
  orderbook.v1.Side side = 3;
  orderbook.v1.PositionSide position_side = 4;
  orderbook.v1.OrderType order_type = 5;
  int64 price = 6;
  int64 quantity = 7;
}

message PreviewOrderImpactResponse {
  // buying_power_impact is what would be deducted from cash on hold.
  // Always >= 0. Long sells, short covers, and OCOs report 0.
  int64 buying_power_impact = 1;

  // Projected snapshot AFTER the order has filled (using the order
  // price as the fill price; market orders walk the book server-side).
  int64 projected_equity = 2;
  int64 projected_maintenance_requirement = 3;
  int64 projected_margin_excess = 4;
  bool projected_in_call = 5;

  // sufficient_buying_power = current buying_power >= buying_power_impact.
  bool sufficient_buying_power = 6;

  // estimated_fill_price is the actual cost-per-share the server
  // expects (limit = the typed price; market = book-walk average).
  // Zero if not estimable (e.g. market BUY with no ask liquidity).
  int64 estimated_fill_price = 7;

  // Human-readable warnings, e.g. "would breach maintenance margin"
  // or "no ask liquidity for market buy". Empty when the preview is
  // clean.
  repeated string warnings = 8;

  // Per-side transaction fee on the simulated fill, in cash units
  // (TxnFeeBps applied to estimated_fill_price * quantity). Zero when
  // estimated_fill_price is zero. The seller side pays a symmetric
  // fee that is not shown here — this is what the previewing account
  // would be charged.
  int64 estimated_fee = 9;
}

message PositionMarginInfo {
  string symbol = 1;
  // LONG: account owns quantity shares. SHORT: account owes quantity.
  orderbook.v1.PositionSide side = 2;
  int64 quantity = 3;
  // avg_price is the average open cost (long) or average open price (short).
  int64 avg_price = 4;
  int64 mark_price = 5;
  int64 market_value = 6;
  // Signed: positive = paper gain, negative = paper loss.
  int64 unrealized_pnl = 7;
  // True when no mark was available; market_value and unrealized_pnl
  // are zero in that case.
  bool mark_missing = 8;
}
