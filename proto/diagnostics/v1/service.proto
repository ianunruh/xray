syntax = "proto3";

package diagnostics.v1;

option go_package = "github.com/ianunruh/xray/gen/diagnostics/v1;diagnosticsv1";

import "google/protobuf/timestamp.proto";

service DiagnosticsService {
  rpc ListAggregates(ListAggregatesRequest) returns (ListAggregatesResponse);
  rpc GetAggregateEvents(GetAggregateEventsRequest) returns (GetAggregateEventsResponse);
  // GetEventChain returns every event sharing the given correlation_id,
  // ordered by timestamp. The reactor's ctx-propagation guarantees that a
  // single user action and all its downstream effects share one correlation.
  rpc GetEventChain(GetEventChainRequest) returns (GetEventChainResponse);

  // ListProjections returns a snapshot of every registered projection
  // consumer: its current checkpoint, the stream head, and whether
  // it's eligible for rebuild.
  rpc ListProjections(ListProjectionsRequest) returns (ListProjectionsResponse);
  // RebuildProjection kicks off an in-place rebuild of the named consumer.
  // Returns immediately; subscribe to StreamProjectionProgress for ticks.
  rpc RebuildProjection(RebuildProjectionRequest) returns (RebuildProjectionResponse);
  // StreamProjectionProgress emits a tick per dispatched batch during a
  // rebuild, plus a terminal tick when the consumer returns to RUNNING
  // or FAILED. The stream closes when the rebuild terminates.
  rpc StreamProjectionProgress(StreamProjectionProgressRequest) returns (stream ProjectionProgress);

  // GetOperationsStatus returns a point-in-time snapshot of the three
  // background loops (fees accruer, periodic reconciler, margin
  // reactor) so the UI can show "is this thing running."
  rpc GetOperationsStatus(GetOperationsStatusRequest) returns (GetOperationsStatusResponse);
}

message ListAggregatesRequest {
  // Optional filter on aggregate ID (substring match, case-insensitive).
  string filter = 1;
}

message AggregateSummary {
  string aggregate_id = 1;
  string type = 2;
  int32 event_count = 3;
  google.protobuf.Timestamp first_event_at = 4;
  google.protobuf.Timestamp last_event_at = 5;
}

message ListAggregatesResponse {
  repeated AggregateSummary aggregates = 1;
}

message GetAggregateEventsRequest {
  string aggregate_id = 1;
}

message DiagnosticEvent {
  string id = 1;
  string aggregate_id = 2;
  string type = 3;
  int32 version = 4;
  int64 position = 5;
  google.protobuf.Timestamp timestamp = 6;
  // JSON-encoded event payload (protojson).
  string data_json = 7;
  // Parent event ID (the event that caused the command that produced this
  // event). Empty for origin events.
  string causation_id = 8;
  // Root of the causation chain — every event triggered by the same user
  // action shares this ID.
  string correlation_id = 9;
}

message GetAggregateEventsResponse {
  repeated DiagnosticEvent events = 1;
}

message GetEventChainRequest {
  string correlation_id = 1;
}

message GetEventChainResponse {
  repeated DiagnosticEvent events = 1;
}

enum ProjectionPhase {
  PROJECTION_PHASE_UNSPECIFIED = 0;
  PROJECTION_PHASE_RUNNING = 1;
  PROJECTION_PHASE_REBUILDING = 2;
  PROJECTION_PHASE_STOPPED = 3;
  PROJECTION_PHASE_FAILED = 4;
}

message ListProjectionsRequest {}

message ProjectionStatus {
  string name = 1;
  ProjectionPhase phase = 2;
  uint64 checkpoint = 3;
  uint64 head_sequence = 4;
  uint64 lag = 5;
  bool rebuildable = 6;
  // Empty when rebuildable=true; otherwise a human-readable reason
  // (e.g. "consumer hosts a reactor").
  string reason_not_rebuildable = 7;
  google.protobuf.Timestamp rebuild_started_at = 8;
  string rebuild_last_error = 9;
  int32 projection_count = 10;
  int32 resettable_count = 11;
}

message ListProjectionsResponse {
  repeated ProjectionStatus projections = 1;
}

message RebuildProjectionRequest {
  string name = 1;
}

message RebuildProjectionResponse {}

message StreamProjectionProgressRequest {
  string name = 1;
}

message ProjectionProgress {
  string name = 1;
  ProjectionPhase phase = 2;
  uint64 position = 3;
  uint64 head_sequence = 4;
  double events_per_sec = 5;
  int64 eta_seconds = 6;
  int32 batch_size = 7;
  // Non-empty when phase=FAILED.
  string error = 8;
  google.protobuf.Timestamp at = 9;
}

message GetOperationsStatusRequest {}

message GetOperationsStatusResponse {
  AccruerStatus            accruer            = 1;
  ReconcilerStatus         reconciler         = 2;
  MarginReactorStatus      margin_reactor     = 3;
  SettlementReactorStatus  settlement_reactor = 4;
}

// AccruerStatus mirrors internal/feesaccruer.Status. Durations are in
// milliseconds. LastTickAt unset = the loop hasn't ticked yet.
message AccruerStatus {
  int64                     interval_ms        = 1;
  int64                     min_elapsed_ms     = 2;
  google.protobuf.Timestamp last_tick_at       = 3;
  int64                     last_tick_ms       = 4;
  int32                     last_tick_accounts = 5;
  int32                     last_tick_failed   = 6;
}

// ReconcilerStatus mirrors internal/reconciler.Status.
message ReconcilerStatus {
  int64                     interval_ms                       = 1;
  google.protobuf.Timestamp last_tick_at                      = 2;
  int64                     last_tick_ms                      = 3;
  int32                     last_tick_sagas_reconciled        = 4;
  int32                     last_tick_margin_calls_evaluated  = 5;
  int32                     last_tick_failed_sagas            = 6;
}

// MarginReactorStatus is the reactor's static config plus a live
// count of open margin calls. Event-driven, no tick semantics.
message MarginReactorStatus {
  int64 grace_ms          = 1;
  int32 active_call_count = 2;
}

// SettlementReactorStatus mirrors internal/settlement.Status.
// settlement_enabled=false means T+1 deferral is off (the reactor
// still runs but always finds no work). interval_ms=0 surfaces
// "settlement reactor disabled at the binary level."
message SettlementReactorStatus {
  bool                      settlement_enabled = 1;
  int64                     window_ms          = 2;
  int64                     interval_ms        = 3;
  google.protobuf.Timestamp last_tick_at       = 4;
  int64                     last_tick_ms       = 5;
  int32                     last_tick_accounts = 6;
  int32                     last_tick_cleared  = 7;
  int32                     last_tick_failed   = 8;
}
