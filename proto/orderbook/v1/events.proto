syntax = "proto3";

package orderbook.v1;

option go_package = "github.com/ianunruh/xray/gen/orderbook/v1;orderbookv1";

import "google/protobuf/timestamp.proto";

enum Side {
  SIDE_UNSPECIFIED = 0;
  SIDE_BUY = 1;
  SIDE_SELL = 2;
}

enum OrderType {
  ORDER_TYPE_UNSPECIFIED = 0;
  ORDER_TYPE_LIMIT = 1;
  ORDER_TYPE_MARKET = 2;
  ORDER_TYPE_STOP_MARKET = 3;
  ORDER_TYPE_STOP_LIMIT = 4;
}

enum TimeInForce {
  TIME_IN_FORCE_UNSPECIFIED = 0;
  TIME_IN_FORCE_GTC = 1;
  TIME_IN_FORCE_IOC = 2;
  TIME_IN_FORCE_FOK = 3;
  TIME_IN_FORCE_DAY = 4;
}

message OrderPlaced {
  string order_id = 1;
  string symbol = 2;
  Side side = 3;
  int64 price = 4;
  int64 quantity = 5;
  google.protobuf.Timestamp placed_at = 6;
  OrderType order_type = 7;
  TimeInForce time_in_force = 8;
  int64 stop_price = 9;
  string account_id = 10;
}

message OrderCancelled {
  string order_id = 1;
  string symbol = 2;
  string reason = 3;
}

message TradeExecuted {
  string trade_id = 1;
  string buy_order_id = 2;
  string sell_order_id = 3;
  string symbol = 4;
  int64 price = 5;
  int64 quantity = 6;
  google.protobuf.Timestamp executed_at = 7;
}

message StopTriggered {
  string order_id = 1;
  string symbol = 2;
  int64 stop_price = 3;
  int64 trigger_price = 4;
  OrderType activated_as = 5;
}

message MarketClosed {
  string symbol = 1;
  google.protobuf.Timestamp closed_at = 2;
}

// Saga lifecycle events — stored under aggregate ID "saga:{uuid}".

message SagaStarted {
  string saga_id = 1;
  string symbol = 2;
  Side entry_side = 3;
  int64 entry_price = 4;
  int64 entry_quantity = 5;
  int64 take_profit_price = 6;
  int64 stop_loss_price = 7;
  // entry_order_id is set on the SagaStarted event for backward
  // compatibility with previously-stored events. New brackets derive
  // the entry order ID from the entry ordersaga (ordersaga.OrderID).
  string entry_order_id = 8;
  google.protobuf.Timestamp started_at = 9;
  string account_id = 10;
}

message EntryFilled {
  string saga_id = 1;
  string take_profit_order_id = 2;
  string stop_loss_order_id = 3;
  google.protobuf.Timestamp filled_at = 4;
}

message ExitFilled {
  string saga_id = 1;
  string filled_order_id = 2;
  string cancelled_order_id = 3;
  google.protobuf.Timestamp filled_at = 4;
}

message SagaCompleted {
  string saga_id = 1;
  google.protobuf.Timestamp completed_at = 2;
}

message SagaFailed {
  string saga_id = 1;
  string reason = 2;
  google.protobuf.Timestamp failed_at = 3;
}

message SagaActionFailed {
  string saga_id = 1;
  string action = 2;
  int32 attempts = 3;
  google.protobuf.Timestamp failed_at = 4;
}
