syntax = "proto3";

package portfolio.v1;

option go_package = "github.com/ianunruh/xray/gen/portfolio/v1;portfoliov1";

import "google/protobuf/timestamp.proto";
import "orderbook/v1/events.proto";
import "saga/v1/saga.proto";

// Portfolio events — stored under aggregate ID "portfolio:{account_id}".

message CashDeposited {
  string account_id = 1;
  int64 amount = 2;
  google.protobuf.Timestamp deposited_at = 3;
}

message CashWithdrawn {
  string account_id = 1;
  int64 amount = 2;
  google.protobuf.Timestamp withdrawn_at = 3;
}

message CashHeld {
  string account_id = 1;
  string order_saga_id = 2;
  int64 amount = 3;
  google.protobuf.Timestamp held_at = 4;
  // Symbol the long-buy hold is for. Used by the aggregate to enforce
  // the "no long position while short in symbol" rule at hold time.
  string symbol = 5;
}

message CashReleased {
  string account_id = 1;
  string order_saga_id = 2;
  int64 amount = 3;
  google.protobuf.Timestamp released_at = 4;
}

message CashSettled {
  string account_id = 1;
  string order_saga_id = 2;
  int64 amount = 3;
  string symbol = 4;
  int64 quantity = 5;
  int64 cost_per_share = 6;
  google.protobuf.Timestamp settled_at = 7;
  // trade_id deduplicates settlement events per saga; legacy events
  // pre-dating this field have it empty and bypass dedup.
  string trade_id = 8;
}

message SharesCredited {
  string account_id = 1;
  string symbol = 2;
  int64 quantity = 3;
  int64 cost_per_share = 4;
  google.protobuf.Timestamp credited_at = 5;
}

message SharesDebited {
  string account_id = 1;
  string symbol = 2;
  int64 quantity = 3;
  string order_saga_id = 4;
  google.protobuf.Timestamp debited_at = 5;
}

message SharesHeld {
  string account_id = 1;
  string order_saga_id = 2;
  string symbol = 3;
  int64 quantity = 4;
  google.protobuf.Timestamp held_at = 5;
}

message SharesReleased {
  string account_id = 1;
  string order_saga_id = 2;
  string symbol = 3;
  int64 quantity = 4;
  google.protobuf.Timestamp released_at = 5;
}

message SharesSettled {
  string account_id = 1;
  string order_saga_id = 2;
  string symbol = 3;
  int64 quantity = 4;
  int64 price_per_share = 5;
  int64 proceeds = 6;
  google.protobuf.Timestamp settled_at = 7;
  // trade_id deduplicates settlement events per saga; legacy events
  // pre-dating this field have it empty and bypass dedup.
  string trade_id = 8;
}

// --- Short-selling events ---

// CollateralHeld locks cash above-and-beyond the eventual sale proceeds
// as collateral against a pending short-open saga. The hold amount is
// pre-computed by the caller from policy (e.g. 50% of notional under a
// Reg-T-style rule) so the aggregate stays policy-agnostic.
message CollateralHeld {
  string account_id = 1;
  string order_saga_id = 2;
  string symbol = 3;
  int64 quantity = 4;
  int64 amount = 5;
  google.protobuf.Timestamp held_at = 6;
}

// CollateralReleased returns a pre-fill collateral hold to CashBalance,
// e.g. when the short-open saga aborts before the sell-to-open executes.
message CollateralReleased {
  string account_id = 1;
  string order_saga_id = 2;
  int64 amount = 3;
  google.protobuf.Timestamp released_at = 4;
}

// ShortOpened settles a sell-to-open fill. Consumes the saga's collateral
// hold and moves both proceeds_held (sale proceeds) and collateral_held
// (extra margin) into the per-symbol short position's locked pools.
// new_avg_open_price is computed by the command — weighted across prior
// opens of the same short — so the applier is a pure assignment.
message ShortOpened {
  string account_id = 1;
  string order_saga_id = 2;
  string trade_id = 3;
  string symbol = 4;
  int64 quantity = 5;
  int64 price_per_share = 6;
  int64 proceeds_held = 7;
  int64 collateral_held = 8;
  int64 new_avg_open_price = 9;
  google.protobuf.Timestamp opened_at = 10;
}

// ShortCoverHeld reserves capacity to buy-to-cover against an existing
// short. No cash side effect — cash comes from the short's pooled
// proceeds and collateral on settlement.
message ShortCoverHeld {
  string account_id = 1;
  string order_saga_id = 2;
  string symbol = 3;
  int64 quantity = 4;
  google.protobuf.Timestamp held_at = 5;
}

message ShortCoverReleased {
  string account_id = 1;
  string order_saga_id = 2;
  string symbol = 3;
  int64 quantity = 4;
  google.protobuf.Timestamp released_at = 5;
}

// ShortCovered settles a buy-to-cover fill. Cost is paid from the
// proportionally released proceeds_pool first, then collateral_pool,
// then CashBalance for any residual (loss beyond pooled collateral).
// realized_pnl uses the short's average open price, not the marginal
// proceeds_released ratio.
message ShortCovered {
  string account_id = 1;
  string order_saga_id = 2;
  string trade_id = 3;
  string symbol = 4;
  int64 quantity = 5;
  int64 cost_per_share = 6;
  int64 cost = 7;
  int64 proceeds_released = 8;
  int64 collateral_released = 9;
  int64 realized_pnl = 10;
  google.protobuf.Timestamp covered_at = 11;
}

// MarginCallIssued records that a margin breach was detected. Emitted
// by the margin-call reactor on the portfolio aggregate; the snapshot
// fields are at-issuance and not updated as the situation evolves.
// call_id is deterministic from (account_id, issue_trigger_event_id)
// so replays don't double-issue.
message MarginCallIssued {
  string account_id = 1;
  string call_id = 2;
  // The TradeExecuted trade_id that moved the mark into breach. Empty
  // for snapshot-style calls (e.g. fired by manual recheck).
  string trigger_trade_id = 3;
  // Symbol whose mark moved into breach.
  string trigger_symbol = 4;
  int64 mark_price = 5;
  int64 equity_at_issue = 6;
  int64 maintenance_requirement_at_issue = 7;
  google.protobuf.Timestamp issued_at = 8;
  // The wall-clock instant at which the user's grace period ends and
  // auto-liquidation will fire if the breach hasn't been resolved.
  // Computed at issue time as issued_at + reactor grace duration.
  // Frozen on the event so replay produces a deterministic timeline.
  google.protobuf.Timestamp grace_expires_at = 9;
}

// MarginCallCovered records that the breach was remediated, either by
// the auto-liquidation reactor closing enough shorts or by the user
// adding cash or covering manually.
message MarginCallCovered {
  string account_id = 1;
  string call_id = 2;
  int64 equity_at_cover = 3;
  int64 maintenance_requirement_at_cover = 4;
  google.protobuf.Timestamp covered_at = 5;
}

// MarginInterestAccrued records one cycle of interest charged on the
// outstanding margin loan. amount may be zero — the event still fires
// on every cycle to advance the accrual clock (LastAccruedAt), so the
// next cycle can compute elapsed correctly. Periodic, emitted by the
// fees accruer.
message MarginInterestAccrued {
  string account_id = 1;
  google.protobuf.Timestamp period_start = 2;
  google.protobuf.Timestamp period_end = 3;
  // Loan principal at the time of accrual (snapshot of MarginLoan()).
  int64 principal = 4;
  // Annual rate in bps used for this charge (audit).
  int64 rate_bps = 5;
  // Cash debited. Always >= 0; zero when there's no outstanding loan.
  int64 amount = 6;
}

// ShortBorrowFeeAccrued records one cycle of borrow fee charged on
// one open short position. One event per (account, symbol) per cycle,
// emitted only when amount > 0.
message ShortBorrowFeeAccrued {
  string account_id = 1;
  google.protobuf.Timestamp period_start = 2;
  google.protobuf.Timestamp period_end = 3;
  string symbol = 4;
  int64 mark_price = 5;
  int64 qty = 6;
  int64 rate_bps = 7;
  int64 amount = 8;
}

// Order saga events — stored under aggregate ID "order-saga:{uuid}".

message OrderSagaStarted {
  string saga_id = 1;
  string account_id = 2;
  string symbol = 3;
  orderbook.v1.Side side = 4;
  int64 price = 5;
  int64 quantity = 6;
  orderbook.v1.OrderType order_type = 7;
  orderbook.v1.TimeInForce time_in_force = 8;
  google.protobuf.Timestamp started_at = 9;
  string replace_order_id = 10;
  // Drives which portfolio hold the reactor issues:
  //   BUY  + LONG   -> HoldCash
  //   SELL + LONG   -> HoldShares
  //   SELL + SHORT  -> HoldCollateral
  //   BUY  + SHORT  -> HoldShortCover
  orderbook.v1.PositionSide position_side = 11;
  // cause_event_id, if set, points at the upstream event that triggered
  // this saga — e.g. a MarginCallIssued event for forced-liquidation
  // runs. Surfaces in the existing causation chain viewer.
  string cause_event_id = 12;
  saga.v1.Initiator initiator = 13;
  // Iceberg slice size for the underlying orderbook order; 0 = non-iceberg.
  // Held cash/collateral still covers the full quantity.
  int64 display_quantity = 14;
  // Trailing-stop params for the underlying orderbook order. stop_price
  // on the orderbook order is the *initial* trigger; trail_amount or
  // trail_offset_bps controls how it ratchets.
  int64 trail_amount = 15;
  int32 trail_offset_bps = 16;
  int64 limit_offset = 17;
  // Initial stop_price for any stop variant of the underlying order.
  int64 stop_price = 18;
}

message OrderSagaCashHeld {
  string saga_id = 1;
  int64 amount_held = 2;
  google.protobuf.Timestamp held_at = 3;
}

// OrderSagaCollateralHeld is the SELL+SHORT analog of OrderSagaCashHeld.
// amount_held is the additional collateral posted on top of the eventual
// sale proceeds.
message OrderSagaCollateralHeld {
  string saga_id = 1;
  int64 amount_held = 2;
  google.protobuf.Timestamp held_at = 3;
}

message OrderSagaOrderPlaced {
  string saga_id = 1;
  string order_id = 2;
  google.protobuf.Timestamp placed_at = 3;
}

message OrderSagaFillRecorded {
  string saga_id = 1;
  string trade_id = 2;
  int64 fill_quantity = 3;
  int64 fill_price = 4;
  int64 cash_settled = 5;
  google.protobuf.Timestamp filled_at = 6;
}

message OrderSagaCompleted {
  string saga_id = 1;
  google.protobuf.Timestamp completed_at = 2;
}

message OrderSagaFailed {
  string saga_id = 1;
  string reason = 2;
  google.protobuf.Timestamp failed_at = 3;
}

message OrderSagaActionFailed {
  string saga_id = 1;
  string action = 2;
  int32 attempts = 3;
  google.protobuf.Timestamp failed_at = 4;
}
