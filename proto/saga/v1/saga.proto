syntax = "proto3";

package saga.v1;

option go_package = "github.com/ianunruh/xray/gen/saga/v1;sagav1";

import "google/protobuf/timestamp.proto";
import "orderbook/v1/events.proto";

service SagaService {
  rpc Place(PlaceSagaRequest) returns (PlaceSagaResponse);
  rpc Get(GetSagaRequest) returns (GetSagaResponse);
  rpc Cancel(CancelSagaRequest) returns (CancelSagaResponse);
  rpc List(ListSagasRequest) returns (ListSagasResponse);
}

// SagaKind identifies which underlying saga aggregate backs a saga ID.
enum SagaKind {
  SAGA_KIND_UNSPECIFIED = 0;
  SAGA_KIND_SINGLE_ORDER = 1;
  SAGA_KIND_BRACKET = 2;
  SAGA_KIND_OCO = 3;
  SAGA_KIND_TWAP = 4;
}

// SagaStatus is the top-level lifecycle marker shared by all kinds.
// Granular per-kind phase lives in the details oneof on GetSagaResponse.
enum SagaStatus {
  SAGA_STATUS_UNSPECIFIED = 0;
  SAGA_STATUS_ACTIVE = 1;
  SAGA_STATUS_COMPLETED = 2;
  SAGA_STATUS_FAILED = 3;
  // The saga was cancelled mid-flight by a margin-call reactor forcing
  // liquidation, not by the user or an action-failure budget. Distinct
  // from FAILED so the UI and audit log can attribute it correctly,
  // and so retry/backoff logic doesn't kick in. Underlying aggregate
  // state is OrderSagaFailed{reason="margin_call"}; the projection
  // surfaces this status based on the reason tag.
  SAGA_STATUS_LIQUIDATED = 4;
}

// Initiator identifies what caused a saga to start. Lives in saga/v1
// because portfolio/v1 needs to reference it on OrderSagaStarted, and
// putting it the other way would force a saga -> portfolio import that
// closes a cycle (saga already imports orderbook for Side/PositionSide).
enum Initiator {
  INITIATOR_UNSPECIFIED = 0;
  INITIATOR_USER = 1;
  INITIATOR_MARGIN_CALL = 2;
}

message PlaceSagaRequest {
  string account_id = 1;
  oneof plan {
    SingleOrderPlan single_order = 2;
    BracketPlan bracket = 3;
    OCOPlan oco = 4;
    TWAPPlan twap = 5;
  }
}

message SingleOrderPlan {
  string symbol = 1;
  orderbook.v1.Side side = 2;
  int64 price = 3;
  int64 quantity = 4;
  orderbook.v1.OrderType order_type = 5;
  orderbook.v1.TimeInForce time_in_force = 6;
  // Optional: when set, the new order replaces this existing order ID
  // (cancel-and-place).
  string replace_order_id = 7;
  // SELL+SHORT = sell-to-open; BUY+SHORT = buy-to-cover. Server
  // validates legal combos (e.g. BUY+SHORT requires existing short
  // >= quantity in symbol).
  orderbook.v1.PositionSide position_side = 8;
  // Iceberg slice size; 0 = normal order. Limit + GTC/Day only.
  int64 display_quantity = 9;
  // Trailing-stop params. Required when order_type is TRAILING_STOP_*.
  int64 trail_amount = 10;
  int32 trail_offset_bps = 11;
  int64 limit_offset = 12;
  // Initial stop_price; required for any stop variant (fixed or
  // trailing). Trailing stops then ratchet from this baseline.
  int64 stop_price = 13;
}

message BracketPlan {
  string symbol = 1;
  orderbook.v1.Side entry_side = 2;
  int64 entry_price = 3;
  int64 entry_quantity = 4;
  int64 take_profit_price = 5;
  int64 stop_loss_price = 6;
  // LONG bracket -> entry BUY+LONG, exits SELL+LONG.
  // SHORT bracket -> entry SELL+SHORT, exits BUY+SHORT.
  orderbook.v1.PositionSide position_side = 7;
}

// OCOPlan: sell (or cover) `quantity` shares with two exit orders that
// are mutually exclusive — whichever fills first cancels the other at
// the orderbook layer. exit_side identifies which side the OCO orders
// land on (typically SELL to exit a long position; BUY to exit a short).
message OCOPlan {
  string symbol = 1;
  orderbook.v1.Side exit_side = 2;
  int64 quantity = 3;
  int64 take_profit_price = 4;
  int64 stop_loss_price = 5;
  // LONG = exiting long inventory (exit_side typically SELL).
  // SHORT = covering a short (exit_side typically BUY). Determines
  // whether the saga's pre-place step holds long shares or short
  // cover-capacity.
  orderbook.v1.PositionSide position_side = 6;
}

// TWAPPlan slices a parent order into `slice_count` child orders spaced
// `slice_interval_ms` apart. Each slice is a marketable limit IOC at
// `limit_price` — the saga never crosses past this price. Underfilled
// quantity rolls into the next slice. The aggregate is just an
// orchestrator; cash holds, share holds, and settlement all live in the
// per-slice child OrderSagas.
message TWAPPlan {
  string symbol = 1;
  orderbook.v1.Side side = 2;
  orderbook.v1.PositionSide position_side = 3;
  int64 total_quantity = 4;
  int32 slice_count = 5;
  int64 slice_interval_ms = 6;
  // limit_price caps the worst price any slice will accept. Each child
  // OrderSaga places an IOC at this price; unfilled qty rolls forward.
  int64 limit_price = 7;
}

message PlaceSagaResponse {
  string saga_id = 1;
}

message GetSagaRequest {
  string saga_id = 1;
}

message GetSagaResponse {
  string saga_id = 1;
  SagaKind kind = 2;
  SagaStatus status = 3;
  string account_id = 4;
  string symbol = 5;
  google.protobuf.Timestamp started_at = 6;
  google.protobuf.Timestamp ended_at = 7;
  string fail_reason = 8;
  oneof details {
    SingleOrderDetails single_order = 9;
    BracketDetails bracket = 10;
    OCODetails oco = 11;
    TWAPDetails twap = 12;
  }
}

// SingleOrderPhase is the granular state for SAGA_KIND_SINGLE_ORDER.
enum SingleOrderPhase {
  SINGLE_ORDER_PHASE_UNSPECIFIED = 0;
  SINGLE_ORDER_PHASE_STARTED = 1;
  SINGLE_ORDER_PHASE_CASH_HELD = 2;
  SINGLE_ORDER_PHASE_ORDER_PLACED = 3;
  // SELL+SHORT: extra cash collateral posted before sell-to-open.
  SINGLE_ORDER_PHASE_COLLATERAL_HELD = 4;
  // SELL+LONG and BUY+SHORT: shares (or short-position capacity)
  // reserved before placing. Fills the existing asymmetry where
  // those paths jumped straight from STARTED to ORDER_PLACED.
  SINGLE_ORDER_PHASE_SHARES_HELD = 5;
}

message SingleOrderDetails {
  SingleOrderPhase phase = 1;
  orderbook.v1.Side side = 2;
  int64 price = 3;
  int64 quantity = 4;
  orderbook.v1.OrderType order_type = 5;
  orderbook.v1.TimeInForce time_in_force = 6;
  int64 filled_quantity = 7;
  int64 amount_held = 8;
  int64 cash_settled = 9;
  string order_id = 10;
  orderbook.v1.PositionSide position_side = 11;
  Initiator initiator = 12;
  int64 display_quantity = 13;
  int64 trail_amount = 14;
  int32 trail_offset_bps = 15;
  int64 limit_offset = 16;
  // current_stop_price reflects the live (post-ratchet) stop for
  // trailing stops, so the UI can show the actual trigger rather than
  // the initial value the user placed.
  int64 current_stop_price = 17;
}

// BracketPhase is the granular state for SAGA_KIND_BRACKET.
enum BracketPhase {
  BRACKET_PHASE_UNSPECIFIED = 0;
  BRACKET_PHASE_PENDING_ENTRY = 1;
  BRACKET_PHASE_PENDING_EXIT = 2;
}

message BracketDetails {
  BracketPhase phase = 1;
  orderbook.v1.Side entry_side = 2;
  int64 entry_price = 3;
  int64 entry_quantity = 4;
  int64 take_profit_price = 5;
  int64 stop_loss_price = 6;
  string entry_order_id = 7;
  string take_profit_order_id = 8;
  string stop_loss_order_id = 9;
  orderbook.v1.PositionSide position_side = 10;
  Initiator initiator = 11;
}

// OCOPhase is the granular state for SAGA_KIND_OCO.
enum OCOPhase {
  OCO_PHASE_UNSPECIFIED = 0;
  OCO_PHASE_STARTED = 1;
  // Long OCO: shares reserved against long inventory.
  // Short OCO: capacity reserved against the open short position.
  OCO_PHASE_SHARES_HELD = 2;
  OCO_PHASE_EXIT_PLACED = 3;
}

message OCODetails {
  OCOPhase phase = 1;
  orderbook.v1.Side exit_side = 2;
  int64 quantity = 3;
  int64 take_profit_price = 4;
  int64 stop_loss_price = 5;
  string take_profit_order_id = 6;
  string stop_loss_order_id = 7;
  int64 settled_quantity = 8;
  orderbook.v1.PositionSide position_side = 9;
  Initiator initiator = 10;
}

message CancelSagaRequest {
  string saga_id = 1;
}

message CancelSagaResponse {}

message ListSagasRequest {
  // All filters are optional; omit to match any value.
  string account_id = 1;
  string symbol = 2;
  SagaKind kind = 3;
  SagaStatus status = 4;
}

message ListSagasResponse {
  repeated GetSagaResponse sagas = 1;
}

// TWAPPhase is the granular state for SAGA_KIND_TWAP. Coarse-grained
// since the per-slice timeline lives in TWAPDetails.slices.
enum TWAPPhase {
  TWAP_PHASE_UNSPECIFIED = 0;
  TWAP_PHASE_ACTIVE = 1;
  TWAP_PHASE_COMPLETED = 2;
}

message TWAPDetails {
  TWAPPhase phase = 1;
  orderbook.v1.Side side = 2;
  orderbook.v1.PositionSide position_side = 3;
  int64 total_quantity = 4;
  int32 slice_count = 5;
  int64 slice_interval_ms = 6;
  int64 limit_price = 7;
  int32 slices_launched = 8;
  int64 total_filled_quantity = 9;
  // total_cash_settled is the gross notional moved across all completed
  // slices. The UI derives weighted-avg fill price as
  // total_cash_settled / total_filled_quantity.
  int64 total_cash_settled = 10;
  google.protobuf.Timestamp started_at = 11;
  repeated TWAPSliceDetails slices = 12;
  Initiator initiator = 13;
}

message TWAPSliceDetails {
  int32 slice_index = 1;
  string child_saga_id = 2;
  int64 launched_quantity = 3;
  int64 filled_quantity = 4;
  int64 cash_settled = 5;
  google.protobuf.Timestamp launched_at = 6;
  google.protobuf.Timestamp completed_at = 7;
  bool completed = 8;
}
