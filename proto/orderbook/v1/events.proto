syntax = "proto3";

package orderbook.v1;

option go_package = "github.com/ianunruh/xray/gen/orderbook/v1;orderbookv1";

import "google/protobuf/timestamp.proto";

enum Side {
  SIDE_UNSPECIFIED = 0;
  SIDE_BUY = 1;
  SIDE_SELL = 2;
}

// PositionSide is order intent — distinct from Side, which is order
// direction at the book. A BUY can open a long or cover a short; a
// SELL can close a long or open a short. The orderbook itself does
// not care, but sagas and portfolio accounting do. Lives here (the
// shared leaf package) to avoid a circular import between portfolio
// and orderbook protos.
enum PositionSide {
  POSITION_SIDE_UNSPECIFIED = 0;
  POSITION_SIDE_LONG = 1;
  POSITION_SIDE_SHORT = 2;
}

enum OrderType {
  ORDER_TYPE_UNSPECIFIED = 0;
  ORDER_TYPE_LIMIT = 1;
  ORDER_TYPE_MARKET = 2;
  ORDER_TYPE_STOP_MARKET = 3;
  ORDER_TYPE_STOP_LIMIT = 4;
  // Trailing-stop variants. The stop_price on OrderPlaced is the
  // initial trigger; trail_amount or trail_offset_bps (exactly one
  // must be > 0) defines how much the stop "ratchets" as the mark
  // moves favorably. A trailing-stop SELL's stop rises as the mark
  // rises; a trailing-stop BUY's stop falls as the mark falls. When
  // activated, TRAILING_STOP_MARKET behaves as a market IOC and
  // TRAILING_STOP_LIMIT as a limit with limit_offset added (sell) or
  // subtracted (buy) from the activated stop price.
  ORDER_TYPE_TRAILING_STOP_MARKET = 5;
  ORDER_TYPE_TRAILING_STOP_LIMIT = 6;
}

enum TimeInForce {
  TIME_IN_FORCE_UNSPECIFIED = 0;
  TIME_IN_FORCE_GTC = 1;
  TIME_IN_FORCE_IOC = 2;
  TIME_IN_FORCE_FOK = 3;
  TIME_IN_FORCE_DAY = 4;
  // AT_OPEN / AT_CLOSE bind the order to a specific auction cross.
  // Combined with ORDER_TYPE_MARKET this yields MOO/MOC; with
  // ORDER_TYPE_LIMIT it yields LOO/LOC. Unfilled at the uncross →
  // cancelled with reason "missed_auction".
  TIME_IN_FORCE_AT_OPEN = 5;
  TIME_IN_FORCE_AT_CLOSE = 6;
}

// MarketPhase gates how the orderbook handles incoming orders. Default
// (no MarketPhaseChanged events in history) is CONTINUOUS — the existing
// price-time priority matching behaviour. AUCTION accumulates orders
// without crossing; Uncross runs an equilibrium-price algorithm and
// flips back to CONTINUOUS. CLOSING_AUCTION is the same but flips to
// CLOSED on uncross.
//
// LIMIT_STATE and HALTED are LULD (limit-up/limit-down) volatility
// states. LIMIT_STATE lets limit orders at-or-better than the band rest
// but rejects anything that would trade through it; if the symbol stays
// pinned past the grace window, the LULD reactor transitions to HALTED,
// which rejects every new order until a reopening auction completes.
enum MarketPhase {
  MARKET_PHASE_UNSPECIFIED = 0;
  MARKET_PHASE_CONTINUOUS = 1;
  MARKET_PHASE_AUCTION = 2;
  MARKET_PHASE_CLOSING_AUCTION = 3;
  MARKET_PHASE_CLOSED = 4;
  MARKET_PHASE_LIMIT_STATE = 5;
  MARKET_PHASE_HALTED = 6;
}

// CrossType marks how a trade was produced. NONE = ordinary continuous
// trade; OPENING/CLOSING tag the batch emitted by an auction uncross;
// HALT_REOPEN is reserved for intraday halt/reopen auctions.
enum CrossType {
  CROSS_TYPE_NONE = 0;
  CROSS_TYPE_OPENING = 1;
  CROSS_TYPE_CLOSING = 2;
  CROSS_TYPE_HALT_REOPEN = 3;
}

message OrderPlaced {
  string order_id = 1;
  string symbol = 2;
  Side side = 3;
  int64 price = 4;
  int64 quantity = 5;
  google.protobuf.Timestamp placed_at = 6;
  OrderType order_type = 7;
  TimeInForce time_in_force = 8;
  int64 stop_price = 9;
  string account_id = 10;
  // oco_group_id links orders such that the first to trade (any qty)
  // atomically cancels every other order in the group, before further
  // matching or stop-trigger passes. Empty = not in a group.
  string oco_group_id = 11;
  // display_quantity, when > 0, makes this an iceberg order: only
  // display_quantity is exposed to matching at any time, the rest is
  // hidden reserve. When the displayed slice fills, the engine emits
  // IcebergSliceReplenished and re-inserts the order with a fresh
  // placed_at — the new slice loses time priority at its price level.
  // Must be <= quantity. Only valid with Limit + GTC/Day (no Market,
  // IOC, FOK, stop, or auction TIF).
  int64 display_quantity = 12;
  // Trailing-stop fields. Exactly one of trail_amount / trail_offset_bps
  // must be > 0 when order_type is TRAILING_STOP_MARKET / _LIMIT.
  // limit_offset is the gap between the activated stop price and the
  // limit price for TRAILING_STOP_LIMIT only.
  int64 trail_amount = 13;
  int32 trail_offset_bps = 14;
  int64 limit_offset = 15;
}

message OrderCancelled {
  string order_id = 1;
  string symbol = 2;
  string reason = 3;
}

message TradeExecuted {
  string trade_id = 1;
  string buy_order_id = 2;
  string sell_order_id = 3;
  string symbol = 4;
  int64 price = 5;
  int64 quantity = 6;
  google.protobuf.Timestamp executed_at = 7;
  // cross_type=NONE for continuous-matching trades; OPENING/CLOSING for
  // trades emitted by an auction uncross. Informational — projections
  // can use it to highlight closing prints, etc.
  CrossType cross_type = 8;
}

// IcebergSliceReplenished is emitted when an iceberg order's displayed
// slice has fully filled and the engine is exposing the next slice
// from the hidden reserve. new_displayed_qty is the size of the new
// slice (min(display_quantity, hidden_remaining)); hidden_remaining
// is what's left after this replenish. The order is re-inserted at
// the same price with replenished_at as its new placed_at — it loses
// time priority to anyone else already resting at that level. side
// and price are carried so projections don't have to look the order
// back up against the aggregate.
message IcebergSliceReplenished {
  string order_id = 1;
  string symbol = 2;
  int64 new_displayed_qty = 3;
  int64 hidden_remaining = 4;
  google.protobuf.Timestamp replenished_at = 5;
  Side side = 6;
  int64 price = 7;
}

message StopTriggered {
  string order_id = 1;
  string symbol = 2;
  int64 stop_price = 3;
  int64 trigger_price = 4;
  OrderType activated_as = 5;
}

// TrailingStopAdjusted is emitted when a trailing stop's trigger price
// ratchets tighter in response to a favorable mark move. SELL stops
// ratchet up as the mark rises; BUY stops ratchet down as the mark
// falls. The new stop_price replaces the previous trigger; mark_price
// is the trade price that caused the adjustment.
message TrailingStopAdjusted {
  string order_id = 1;
  string symbol = 2;
  int64 previous_stop_price = 3;
  int64 new_stop_price = 4;
  int64 mark_price = 5;
  google.protobuf.Timestamp adjusted_at = 6;
}

message MarketClosed {
  string symbol = 1;
  google.protobuf.Timestamp closed_at = 2;
}

// MarketPhaseChanged announces that the orderbook has moved between
// phases (continuous, auction, closed). Emitted by OpenAuction,
// BeginClosingAuction, and the closing branch of Uncross.
message MarketPhaseChanged {
  string symbol = 1;
  MarketPhase phase = 2;
  // reason is a human-readable tag, e.g. "session_open", "manual",
  // "uncross_complete". Not interpreted by the engine.
  string reason = 3;
  google.protobuf.Timestamp at = 4;
}

// AuctionUncrossed is the header event of an uncross batch, carrying
// the clearing price and aggregate matched/imbalance quantities. The
// individual TradeExecuted events that follow in the same batch carry
// the per-pair fills at clearing_price with cross_type set.
message AuctionUncrossed {
  string symbol = 1;
  int64 clearing_price = 2;
  int64 matched_qty = 3;
  // imbalance_qty is the unmatched quantity at the clearing price on
  // imbalance_side. Zero when balanced.
  int64 imbalance_qty = 4;
  Side imbalance_side = 5;
  CrossType cross_type = 6;
  google.protobuf.Timestamp at = 7;
}

// OfficialCloseSet is the canonical end-of-day mark, derivable from
// the last cross_type=CLOSING trade but emitted explicitly so the
// daily_close projection doesn't have to scan trades.
//
// Downstream consumers (fund NAV, mark-to-market, charting close axis,
// closing-print UI badges) treat this as the authoritative session-end
// price. session_date is a YYYY-MM-DD string for easy keying.
message OfficialCloseSet {
  string symbol = 1;
  string session_date = 2;
  int64 close_price = 3;
  int64 close_volume = 4;
  google.protobuf.Timestamp at = 5;
}

// SymbolRenamed terminates an orderbook aggregate's order-accepting
// life. Future PlaceOrder / OpenAuction commands reject; the
// aggregate's events stay in history for audit and replay. The new
// symbol gets a fresh aggregate (created lazily on first order
// against it). Emitted by the corporate-action coordinator on a
// SYMBOL_CHANGE action.
message SymbolRenamed {
  string                    old_symbol = 1;
  string                    new_symbol = 2;
  string                    action_id  = 3;
  google.protobuf.Timestamp renamed_at = 4;
}

// LULD (Limit-Up/Limit-Down) volatility-moderator events. The price-band
// math and timer state live on the OrderBook aggregate so replay is
// deterministic; the LULD reactor (internal/luld) drives band updates
// and timer-based transitions.

// LULDBandsSet announces a new reference price and the upper/lower
// limit bands derived from band_bps (basis points). Reason is one of
// "initial", "reference_update", "tier_change", "split_reanchor",
// "halt_reopen". The reactor emits this whenever the rolling reference
// moves enough to shift the bands by at least one tick.
message LULDBandsSet {
  string                    symbol          = 1;
  int64                     reference_price = 2;
  int64                     upper_band      = 3;
  int64                     lower_band      = 4;
  int32                     band_bps        = 5;
  string                    reason          = 6;
  google.protobuf.Timestamp at              = 7;
}

// LULDLimitStateEntered is emitted when a would-be trade pierces a
// band: the trade is cancelled, the aggressor's remainder is cancelled
// with reason "luld_band", and the symbol moves to MARKET_PHASE_LIMIT_STATE.
// band_side is Buy if the pierced band is the upper one (buy pressure),
// Sell otherwise. halt_deadline = at + grace; if the reactor still sees
// limit-state at halt_deadline, it triggers TradingHalted.
message LULDLimitStateEntered {
  string                    symbol           = 1;
  Side                      band_side        = 2;
  int64                     band_price       = 3;
  string                    trigger_order_id = 4;
  google.protobuf.Timestamp at               = 5;
  google.protobuf.Timestamp halt_deadline    = 6;
}

// LULDLimitStateExited records the end of a limit-state episode.
// reason ∈ {"price_returned_in_band", "halt_triggered", "manual"}.
// When reason == "halt_triggered", TradingHalted follows in the same
// batch; when reason == "price_returned_in_band", a
// MarketPhaseChanged(CONTINUOUS) follows.
message LULDLimitStateExited {
  string                    symbol = 1;
  string                    reason = 2;
  google.protobuf.Timestamp at     = 3;
}

// TradingHalted moves the symbol to MARKET_PHASE_HALTED — every new
// PlaceOrder is rejected with ErrSymbolHalted. reopen_at is the wall
// clock at which the reactor will open a reopening auction.
message TradingHalted {
  string                    symbol    = 1;
  string                    reason    = 2;
  google.protobuf.Timestamp at        = 3;
  google.protobuf.Timestamp reopen_at = 4;
}

// TradingResumed is a marker event emitted right after a halt-reopen
// auction's MarketPhaseChanged(CONTINUOUS), tagged with the cross_type
// of the reopening uncross (usually CROSS_TYPE_HALT_REOPEN). Projections
// and brokers anchor on this to lift halt banners and re-arm LULD with
// a post-reopen grace window.
message TradingResumed {
  string                    symbol     = 1;
  google.protobuf.Timestamp at         = 2;
  CrossType                 cross_type = 3;
}

// Saga lifecycle events — stored under aggregate ID "saga:{uuid}".

message SagaStarted {
  string saga_id = 1;
  string symbol = 2;
  Side entry_side = 3;
  int64 entry_price = 4;
  int64 entry_quantity = 5;
  int64 take_profit_price = 6;
  int64 stop_loss_price = 7;
  // entry_order_id is set on the SagaStarted event for backward
  // compatibility with previously-stored events. New brackets derive
  // the entry order ID from the entry ordersaga (ordersaga.OrderID).
  string entry_order_id = 8;
  google.protobuf.Timestamp started_at = 9;
  string account_id = 10;
  // SHORT bracket: entry_side=SELL+SHORT (sell-to-open), exits derived
  // as BUY+SHORT (buy-to-cover).
  PositionSide position_side = 11;
}

message EntryFilled {
  string saga_id = 1;
  string take_profit_order_id = 2;
  string stop_loss_order_id = 3;
  google.protobuf.Timestamp filled_at = 4;
}

message ExitFilled {
  string saga_id = 1;
  string filled_order_id = 2;
  string cancelled_order_id = 3;
  google.protobuf.Timestamp filled_at = 4;
}

message SagaCompleted {
  string saga_id = 1;
  google.protobuf.Timestamp completed_at = 2;
}

message SagaFailed {
  string saga_id = 1;
  string reason = 2;
  google.protobuf.Timestamp failed_at = 3;
}

message SagaActionFailed {
  string saga_id = 1;
  string action = 2;
  int32 attempts = 3;
  google.protobuf.Timestamp failed_at = 4;
}

// OCOSaga aggregate events — stored under "oco-saga:{uuid}". An OCO
// saga holds shares once, places TP and SL with a shared orderbook OCO
// group, settles whichever fills first, and releases any remainder on
// failure.
message OCOSagaStarted {
  string saga_id = 1;
  string account_id = 2;
  string symbol = 3;
  Side exit_side = 4;
  int64 quantity = 5;
  int64 take_profit_price = 6;
  int64 stop_loss_price = 7;
  google.protobuf.Timestamp started_at = 8;
  // LONG = exiting long inventory (exit_side typically SELL).
  // SHORT = covering a short (exit_side typically BUY).
  PositionSide position_side = 9;
}

message OCOSagaSharesHeld {
  string saga_id = 1;
  google.protobuf.Timestamp held_at = 2;
}

message OCOSagaExitPlaced {
  string saga_id = 1;
  string take_profit_order_id = 2;
  string stop_loss_order_id = 3;
  google.protobuf.Timestamp placed_at = 4;
}

message OCOSagaFillRecorded {
  string saga_id = 1;
  string trade_id = 2;
  string order_id = 3;
  int64 fill_quantity = 4;
  int64 fill_price = 5;
  google.protobuf.Timestamp recorded_at = 6;
}

message OCOSagaCompleted {
  string saga_id = 1;
  google.protobuf.Timestamp completed_at = 2;
}

message OCOSagaFailed {
  string saga_id = 1;
  string reason = 2;
  google.protobuf.Timestamp failed_at = 3;
}

message OCOSagaActionFailed {
  string saga_id = 1;
  string action = 2;
  int32 attempts = 3;
  google.protobuf.Timestamp failed_at = 4;
}
