server_url: "http://localhost:8080"
price_source: polygon

symbols:
  - symbol: AAPL
    account_id: noise-AAPL
    instances: 4
    initial_deposit: 5000000000 # $500K
    initial_shares: 500
    random_initial_shares: true # credit a uniform random count in [0, initial_shares] per instance
    order_interval: 3s
    min_quantity: 1
    max_quantity: 10
    price_jitter: 200000 # $20.00 — limit orders land in [ref-$20, ref+$20]
    market_order_pct: 0.5 # 50% market orders, 50% limit
    max_position: 1000
    buy_bias: 0.5 # neutral — 50/50 buy/sell

polygon:
  base_url: "https://api.massive.com"
  poll_interval: 60s
