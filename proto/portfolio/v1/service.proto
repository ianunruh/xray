syntax = "proto3";

package portfolio.v1;

option go_package = "github.com/ianunruh/xray/gen/portfolio/v1;portfoliov1";

import "google/protobuf/timestamp.proto";
import "orderbook/v1/events.proto";

service PortfolioService {
  rpc Deposit(DepositRequest) returns (DepositResponse);
  rpc Withdraw(WithdrawRequest) returns (WithdrawResponse);
  rpc CreditShares(CreditSharesRequest) returns (CreditSharesResponse);
  rpc GetPortfolio(GetPortfolioRequest) returns (GetPortfolioResponse);
  rpc StreamPortfolio(StreamPortfolioRequest) returns (stream GetPortfolioResponse);
  rpc GetPnL(GetPnLRequest) returns (GetPnLResponse);
  rpc ListPortfolios(ListPortfoliosRequest) returns (ListPortfoliosResponse);
  rpc GetMarginSnapshot(GetMarginSnapshotRequest) returns (GetMarginSnapshotResponse);
}

message DepositRequest {
  string account_id = 1;
  int64 amount = 2;
}

message DepositResponse {}

message WithdrawRequest {
  string account_id = 1;
  int64 amount = 2;
}

message WithdrawResponse {}

message CreditSharesRequest {
  string account_id = 1;
  string symbol = 2;
  int64 quantity = 3;
  int64 cost_per_share = 4;
}

message CreditSharesResponse {}

message GetPortfolioRequest {
  string account_id = 1;
}

message GetPortfolioResponse {
  string account_id = 1;
  int64 cash_balance = 2;
  int64 cash_held = 3;
  repeated Holding holdings = 4;
  repeated PendingOrder pending_orders = 5;
}

message Holding {
  string symbol = 1;
  int64 quantity = 2;
  int64 total_cost = 3;
  int64 average_cost = 4;
  int64 shares_held = 5;
  int64 realized_pnl = 6;
}

message PendingOrder {
  string saga_id = 1;
  string symbol = 2;
  orderbook.v1.Side side = 3;
  int64 price = 4;
  int64 quantity = 5;
  orderbook.v1.OrderType order_type = 6;
  orderbook.v1.TimeInForce time_in_force = 7;
  int64 filled_quantity = 8;
  OrderStatus status = 9;
  google.protobuf.Timestamp started_at = 10;
  string fail_reason = 11;
  google.protobuf.Timestamp ended_at = 12;
}

// OrderStatus is kept for the PendingOrder field on GetPortfolioResponse,
// which the portfolio projection still surfaces inline. The dedicated
// per-saga GetOrderStatus RPC has moved to saga.v1.SagaService.Get.
enum OrderStatus {
  ORDER_STATUS_UNSPECIFIED = 0;
  ORDER_STATUS_STARTED = 1;
  ORDER_STATUS_CASH_HELD = 2;
  ORDER_STATUS_ORDER_PLACED = 3;
  ORDER_STATUS_COMPLETED = 4;
  ORDER_STATUS_FAILED = 5;
}

message StreamPortfolioRequest {
  string account_id = 1;
}

message GetPnLRequest {
  string account_id = 1;
}

message GetPnLResponse {
  string account_id = 1;
  repeated PositionPnL positions = 2;
  int64 total_realized_pnl = 3;
  repeated PnLEntry history = 4;
}

message PositionPnL {
  string symbol = 1;
  int64 quantity = 2;
  int64 avg_cost = 3;
  int64 total_cost = 4;
  int64 realized_pnl = 5;
  // LONG (default) = bought, owns shares. SHORT = sold-to-open,
  // owes shares back. avg_cost is the open price for shorts.
  orderbook.v1.PositionSide position_side = 6;
}

message PnLEntry {
  string symbol = 1;
  orderbook.v1.Side side = 2;
  int64 quantity = 3;
  int64 price = 4;
  int64 realized_pnl = 5;
  google.protobuf.Timestamp settled_at = 6;
  orderbook.v1.PositionSide position_side = 7;
}

message ListPortfoliosRequest {}

message ListPortfoliosResponse {
  repeated string account_ids = 1;
}

// GetMarginSnapshot returns a point-in-time mark-to-market view of an
// account: cash buckets, position market values, equity, and the
// maintenance-margin requirement implied by open shorts at current
// marks.
message GetMarginSnapshotRequest {
  string account_id = 1;
}

message GetMarginSnapshotResponse {
  string account_id = 1;

  // Cash buckets (snapshot of portfolio aggregate state).
  int64 cash_balance = 2;
  int64 cash_held = 3;
  int64 collateral_pool = 4;
  int64 proceeds_pool = 5;
  // Per-saga collateral held pre-fill — summed for convenience.
  int64 collateral_held_pre_fill = 6;

  // Market values from current marks. long_market_value is the sum of
  // owned shares at mark; short_liability is the cost to repurchase
  // all open shorts at mark.
  int64 long_market_value = 7;
  int64 short_liability = 8;

  // equity = cash + cash_held + pools + collateral_held_pre_fill +
  //          long_mv - short_liability.
  int64 equity = 9;

  // maintenance_requirement is the equity floor implied by open
  // shorts at the current maintenance rate (see internal/margin).
  int64 maintenance_requirement = 10;

  // margin_excess = equity - maintenance_requirement. Negative means
  // a margin call should fire.
  int64 margin_excess = 11;
  bool margin_call = 12;

  // missing_marks lists symbols held (long or short) for which no
  // mark is currently available. Equity treats their contribution
  // as zero — callers should surface this to avoid acting on
  // stale-by-omission snapshots.
  repeated string missing_marks = 13;

  repeated PositionMarginInfo positions = 14;

  // buying_power is the cash truly available to back new orders —
  // CashBalance after every long-buy hold, short collateral hold,
  // and pool allocation. Distinct from equity: equity counts locked
  // cash too (it's still yours, just earmarked).
  int64 buying_power = 15;
}

message PositionMarginInfo {
  string symbol = 1;
  // LONG: account owns quantity shares. SHORT: account owes quantity.
  orderbook.v1.PositionSide side = 2;
  int64 quantity = 3;
  // avg_price is the average open cost (long) or average open price (short).
  int64 avg_price = 4;
  int64 mark_price = 5;
  int64 market_value = 6;
  // Signed: positive = paper gain, negative = paper loss.
  int64 unrealized_pnl = 7;
  // True when no mark was available; market_value and unrealized_pnl
  // are zero in that case.
  bool mark_missing = 8;
}
