syntax = "proto3";

package orderbook.v1;

option go_package = "github.com/ianunruh/xray/gen/orderbook/v1;orderbookv1";

import "google/protobuf/timestamp.proto";
import "orderbook/v1/events.proto";

message OrderBookSnapshot {
  string symbol = 1;
  repeated OrderSnapshot orders = 2;
}

message OrderSnapshot {
  string order_id = 1;
  Side side = 2;
  int64 price = 3;
  int64 quantity = 4;
  int64 remaining_quantity = 5;
  google.protobuf.Timestamp placed_at = 6;
  OrderType order_type = 7;
  TimeInForce time_in_force = 8;
  int64 stop_price = 9;
  string account_id = 10;
}
