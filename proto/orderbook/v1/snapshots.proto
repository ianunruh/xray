syntax = "proto3";

package orderbook.v1;

option go_package = "github.com/ianunruh/xray/gen/orderbook/v1;orderbookv1";

import "google/protobuf/timestamp.proto";
import "orderbook/v1/events.proto";

message OrderBookSnapshot {
  string symbol = 1;
  repeated OrderSnapshot orders = 2;
  // Default 0 (UNSPECIFIED) restores as CONTINUOUS so historical
  // snapshots taken before phase tracking existed remain valid.
  MarketPhase phase = 3;
  // Cumulative traded quantity for the current session; reset on the
  // session's OfficialCloseSet event. Defaults to 0 for snapshots taken
  // before session-volume tracking existed — the counter then resumes
  // from zero, which mis-counts only events between the snapshot and
  // the next close.
  int64 session_volume = 4;
}

message OrderSnapshot {
  string order_id = 1;
  Side side = 2;
  int64 price = 3;
  int64 quantity = 4;
  int64 remaining_quantity = 5;
  google.protobuf.Timestamp placed_at = 6;
  OrderType order_type = 7;
  TimeInForce time_in_force = 8;
  int64 stop_price = 9;
  string account_id = 10;
  // display_quantity > 0 marks an iceberg order; displayed_remaining
  // tracks how much of the current slice is still visible to matching.
  // Both default to 0 for non-iceberg orders (and for snapshots taken
  // before iceberg support existed).
  int64 display_quantity = 11;
  int64 displayed_remaining = 12;
  // Trailing-stop state. trail_amount and trail_offset_bps mirror the
  // OrderPlaced fields; limit_offset is the offset for TRAILING_STOP_LIMIT.
  int64 trail_amount = 13;
  int32 trail_offset_bps = 14;
  int64 limit_offset = 15;
}
